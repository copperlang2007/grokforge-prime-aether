name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python tests + benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run GGS engine unit tests
        run: python3 -m unittest discover -s src/python -v

      - name: Run GGS capability benchmark
        run: python3 benchmarks/osworld_subset.py

  rust:
    name: Rust compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --verbose
